name: Bug Report
description: Report a bug in the provii-issuer Worker
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behaviour.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened. Include error messages, status codes, or response bodies.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Sandbox or production, plus any relevant client details.
      placeholder: "sandbox, curl 8.x"
    validations:
      required: false
