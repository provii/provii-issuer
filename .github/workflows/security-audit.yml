name: Security Audit

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/dependabot.yml'
      - '.github/CODEOWNERS'
      - '.gitignore'
  pull_request:
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/security-audit.yml'
  schedule:
    # Weekly security scan on Monday at 2 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: 'true'

jobs:
  cargo-audit:
    name: Cargo Audit - Dependency Vulnerabilities
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "security-audit"

      - name: Install cargo-audit
        run: cargo install cargo-audit --version '=0.22.0' --locked

      - name: Clone public dependencies
        run: |
          git clone https://github.com/provii/provii-crypto.git --branch v0.1.0 ../provii-crypto
          git clone https://github.com/provii/provii-audit.git --branch v0.1.0 ../provii-audit

      - name: Run cargo audit
        run: |
          cargo audit \
            --ignore RUSTSEC-2026-0105 `# Expires: 2026-09-01` \
            --ignore RUSTSEC-2024-0436 `# Expires: 2026-09-01` \
            --ignore RUSTSEC-2024-0370 `# Expires: 2026-09-01` \
            --ignore RUSTSEC-2026-0097 `# Expires: 2026-09-01` \
            --ignore RUSTSEC-2026-0173 `# Expires: 2026-09-01`
          # RUSTSEC-2026-0105: timing side-channel in ed25519-dalek verify; mitigated by
          #   constant-time comparison at the application layer. Revisit when upstream patches.
          # RUSTSEC-2024-0436: unmaintained instant crate pulled transitively via worker-build;
          #   no direct usage, awaiting upstream migration to web-time. Revisit Q3 2026.
          # RUSTSEC-2024-0370: proc-macro-error unmaintained, pulled by worker-macros;
          #   compile-time only, no runtime exposure. Revisit when worker-macros updates.
          # RUSTSEC-2026-0097: potential panic in serde_json recursion depth; mitigated by
          #   Cloudflare Workers 128 KB body limit. Revisit when serde_json 2.x stabilises.
        continue-on-error: false

      - name: Check for high/critical vulnerabilities
        if: failure()
        run: |
          echo "::error::High or critical vulnerabilities found in dependencies"
          exit 1

  cargo-deny:
    name: Cargo Deny - License & Security Compliance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install cargo-deny
        run: cargo install cargo-deny --version '=0.19.0' --locked

      - name: Clone public dependencies
        run: |
          git clone https://github.com/provii/provii-crypto.git --branch v0.1.0 ../provii-crypto
          git clone https://github.com/provii/provii-audit.git --branch v0.1.0 ../provii-audit

      - name: Run cargo deny
        run: cargo deny check --hide-inclusion-graph

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0

  rust-security-scan:
    name: Rust Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'fs'
          scanners: 'vuln'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          limit-severities-for-sarif: "true"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  gitleaks:
    name: Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE_KEY }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: '8.21.2'
        run: |
          set -euo pipefail
          curl -sSLo /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -C /tmp -xzf /tmp/gitleaks.tar.gz gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks
        run: gitleaks detect --source . --redact --no-banner --exit-code 1

  zizmor:
    name: Workflow Security Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run Zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          # `min-severity: high` keeps the zizmor job green while still
          # blocking on the categories the security review tracks
          # (impostor-commit, cache-poisoning, dangerous-triggers,
          # template-injection, all rated high). Medium-severity findings
          # (artipacked, excessive-permissions) are tracked separately
          # under the workflow-hardening backlog and would otherwise mask
          # high-severity regressions in CI output.
          min-severity: high
          advanced-security: false

  semgrep:
    name: Semgrep SAST
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      HAS_SEMGREP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN != '' }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Semgrep
        run: pip install semgrep==1.139.0

      - name: Run Semgrep (blocking pass)
        if: ${{ env.HAS_SEMGREP_TOKEN == 'true' }}
        run: |
          semgrep \
            --config p/rust \
            --config p/security-audit \
            --config p/secrets \
            --config .semgrep/ \
            --error \
            --severity ERROR \
            .
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Run Semgrep (local rules only, no token)
        if: ${{ env.HAS_SEMGREP_TOKEN != 'true' }}
        run: |
          semgrep \
            --config .semgrep/ \
            --error \
            --severity ERROR \
            .

      - name: Run Semgrep (SARIF pass)
        if: ${{ always() && env.HAS_SEMGREP_TOKEN == 'true' }}
        run: |
          semgrep \
            --config p/rust \
            --config p/security-audit \
            --config p/secrets \
            --config .semgrep/ \
            --sarif \
            --output semgrep-results.sarif \
            . || true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep SARIF results
        if: ${{ always() && env.HAS_SEMGREP_TOKEN == 'true' }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [cargo-audit, cargo-deny, rust-security-scan, dependency-review, gitleaks, zizmor, semgrep]
    if: always()
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Generate summary
        env:
          RESULT_CARGO_AUDIT: ${{ needs.cargo-audit.result }}
          RESULT_CARGO_DENY: ${{ needs.cargo-deny.result }}
          RESULT_SECURITY_SCAN: ${{ needs.rust-security-scan.result }}
          RESULT_DEP_REVIEW: ${{ needs.dependency-review.result }}
          RESULT_GITLEAKS: ${{ needs.gitleaks.result }}
          RESULT_ZIZMOR: ${{ needs.zizmor.result }}
          RESULT_SEMGREP: ${{ needs.semgrep.result }}
        run: |
          echo "## Security Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Cargo Audit: ${RESULT_CARGO_AUDIT}" >> $GITHUB_STEP_SUMMARY
          echo "- Cargo Deny: ${RESULT_CARGO_DENY}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Scan (Trivy): ${RESULT_SECURITY_SCAN}" >> $GITHUB_STEP_SUMMARY
          echo "- Dependency Review: ${RESULT_DEP_REVIEW}" >> $GITHUB_STEP_SUMMARY
          echo "- Secret Detection: ${RESULT_GITLEAKS}" >> $GITHUB_STEP_SUMMARY
          echo "- Zizmor: ${RESULT_ZIZMOR}" >> $GITHUB_STEP_SUMMARY
          echo "- Semgrep: ${RESULT_SEMGREP}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "For detailed results, check individual job outputs." >> $GITHUB_STEP_SUMMARY

      - name: Write report to file
        env:
          RESULT_CARGO_AUDIT: ${{ needs.cargo-audit.result }}
          RESULT_CARGO_DENY: ${{ needs.cargo-deny.result }}
          RESULT_SECURITY_SCAN: ${{ needs.rust-security-scan.result }}
          RESULT_DEP_REVIEW: ${{ needs.dependency-review.result }}
          RESULT_GITLEAKS: ${{ needs.gitleaks.result }}
          RESULT_ZIZMOR: ${{ needs.zizmor.result }}
          RESULT_SEMGREP: ${{ needs.semgrep.result }}
        run: |
          mkdir -p report
          cat > report/security-audit-summary.txt <<REPORT
          Security Audit Summary - $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          Cargo Audit: ${RESULT_CARGO_AUDIT}
          Cargo Deny: ${RESULT_CARGO_DENY}
          Security Scan (Trivy): ${RESULT_SECURITY_SCAN}
          Dependency Review: ${RESULT_DEP_REVIEW}
          Secret Detection: ${RESULT_GITLEAKS}
          Zizmor: ${RESULT_ZIZMOR}
          Semgrep: ${RESULT_SEMGREP}
          REPORT

      - name: Upload security audit report
        # AUD-IA-20-002: Persist audit report as a downloadable artefact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-audit-report-${{ github.sha }}
          path: report/
          retention-days: 90

      - name: Fail if critical checks failed
        env:
          RESULT_CARGO_AUDIT: ${{ needs.cargo-audit.result }}
          RESULT_CARGO_DENY: ${{ needs.cargo-deny.result }}
          RESULT_SECURITY_SCAN: ${{ needs.rust-security-scan.result }}
          RESULT_DEP_REVIEW: ${{ needs.dependency-review.result }}
          RESULT_GITLEAKS: ${{ needs.gitleaks.result }}
          RESULT_ZIZMOR: ${{ needs.zizmor.result }}
          RESULT_SEMGREP: ${{ needs.semgrep.result }}
        run: |
          failed=""
          [[ "$RESULT_CARGO_AUDIT" == "failure" ]] && failed="$failed cargo-audit"
          [[ "$RESULT_CARGO_DENY" == "failure" ]] && failed="$failed cargo-deny"
          [[ "$RESULT_SECURITY_SCAN" == "failure" ]] && failed="$failed trivy"
          [[ "$RESULT_DEP_REVIEW" == "failure" ]] && failed="$failed dependency-review"
          # Gitleaks is gated by if: ${{ env.GITLEAKS_LICENSE != '' }} so it
          # skips cleanly when the licence key is absent. When it runs and
          # fails, that is a real finding.
          [[ "$RESULT_GITLEAKS" == "failure" ]] && failed="$failed gitleaks"
          [[ "$RESULT_ZIZMOR" == "failure" ]] && failed="$failed zizmor"
          [[ "$RESULT_SEMGREP" == "failure" ]] && failed="$failed semgrep"
          if [[ -n "$failed" ]]; then
            echo "::error::Security checks failed:${failed}"
            exit 1
          fi
